<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>관리자 - 전체 데이터 확인</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body data-page="adminData">
  <div class="layout">
    <aside class="sidebar">
      <div class="brand"><div class="brand-badge">IP</div><div><h1>정보처리기사 학습</h1><p>로컬 JSON 기반 학습 웹앱</p></div></div>
      <div class="top-actions" style="margin-bottom:18px;"><button class="btn primary" id="themeToggle">테마 전환</button></div>
      <nav class="nav-group">
        <a class="nav-item" data-nav="dashboard" href="../index.html">대시보드</a>
        <a class="nav-item" data-nav="written" href="../pages/written.html">정보처리기사 필기</a>
        <a class="nav-item" data-nav="practical" href="../pages/practical.html">정보처리기사 실기</a>
        <a class="nav-item" data-nav="sql" href="../pages/sql.html">SQL 문제</a>
        <a class="nav-item" data-nav="coding" href="../pages/coding.html">코딩 문제</a>
        <a class="nav-item" data-nav="bank" href="../pages/bank.html">문제은행</a>
        <a class="nav-item" data-nav="settings" href="../pages/settings.html">설정페이지</a>
        <a class="nav-item" data-nav="adminWritten" href="../pages/admin-written.html">관리자 - 필기/실기 작성</a>
        <a class="nav-item" data-nav="adminProblems" href="../pages/admin-problems.html">관리자 - 문제 작성</a>
        <a class="nav-item" data-nav="adminBank" href="../pages/admin-bank.html">관리자 - 문제은행 작성</a>
        <a class="nav-item" data-nav="adminData" href="../pages/admin-data.html">관리자 - 전체 데이터</a>
      </nav>
      <p class="footer-note">실사용 시 관리자 메뉴는 삭제하거나 숨기면 됩니다.</p>
    </aside>
    <main class="main">
      <header class="page-header">
        <div><h2>관리자 페이지 - 전체 저장 데이터 확인</h2><p>저장된 전체 데이터를 요약하고 JSON/CSV로 저장 및 불러오기 합니다.</p></div>
        
      </header>
      <section class="stats-grid" id="dataSummary"></section>
      <section class="card" style="margin-top:18px;">
        <div class="toolbar">
          <button class="btn primary" id="adminExportJsonBtn">JSON 저장</button>
          <button class="btn secondary" id="adminExportCsvBtn">CSV 저장</button>
          <input type="file" id="adminImportJsonInput" accept=".json" />
        </div>
      </section>
      <section class="card" style="margin-top:18px;">
        <div class="form-grid two">
          <div class="form-group">
            <label>분야 선택</label>
            <select id="adminDataSectionFilter">
              <option value="all">전체</option>
              <option value="필기">필기</option>
              <option value="실기">실기</option>
              <option value="SQL">SQL 문제</option>
              <option value="CODING">코딩 문제</option>
              <option value="BANK">문제은행</option>
              <option value="RECORD">학습 기록</option>
            </select>
          </div>
          <div class="form-group">
            <label>검색</label>
            <input id="adminDataSearch" placeholder="과목, 주제, 문제, 키워드 등으로 검색" />
          </div>
        </div>
      </section>
      <section id="dataPreview" style="margin-top:18px;"></section>
    </main>
  </div>
  <script src="../js/data.js"></script>
  <script src="../js/storage.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/app.js"></script>
</body>
</html>
